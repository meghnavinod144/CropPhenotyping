<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload | Smart Agriculture</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="upload-bg d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow-lg text-center upload-card">
        <h2 class="mb-3">Upload Image</h2>
        <p class="text-muted" id="analysisType"></p>
        <input type="file" id="fileInput" class="form-control mb-3" accept="image/*">
        <button onclick="uploadImage()" class="btn btn-primary w-100">Upload</button>
        <p id="status" class="mt-3"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
